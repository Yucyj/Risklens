<div class="space-y-6 text-right font-sans animate-fadeIn" dir="rtl">
  <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
    <h2 class="text-xl font-bold text-white">⚙️ الإعدادات وتحديد بيئة الاستثمار (Risk Preferences)</h2>
    <p class="text-xs text-slate-400">إدارة تفضيلات الاستثمار المباشر وتعديل عتبات المخاطر المسموحة آلياً لمحفظتك</p>
  </div>

  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-5">
    <div class="space-y-2">
      <label class="block text-xs font-semibold text-slate-400">مستوى تقبل المخاطرة الأقصى (Risk Tolerance Levels)</label>
      <input type="range" min="1" max="100" value="35" class="w-full h-2 bg-slate-950 rounded-lg appearance-none cursor-pointer accent-emerald-500 border border-slate-800">
      <div class="flex justify-between text-[10px] text-slate-500"><span>متحفظ (حماية سيولة)</span><span>متوازن (35% عتبة الخطر)</span><span>مغامر (تمويل جريء)</span></div>
    </div>

    <div class="pt-4 border-t border-slate-800">
      <button (click)="saveSettings()" class="bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-black text-xs px-5 py-2.5 rounded-xl transition-all cursor-pointer">
        حفظ وتطبيق المتغيرات الاستراتيجية
      </button>
    </div>
  </div>
</div>
