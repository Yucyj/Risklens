<div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6" dir="rtl">
  <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6">
    
    <!-- Header Title -->
    <div class="text-center space-y-2">
      <div class="text-4xl">🧠</div>
      <h2 class="text-2xl font-bold text-white tracking-wide">الوكالة الاستثمارية الذكية</h2>
      <p class="text-sm text-slate-400">بوابة نظام تعظيم الأرباح وإدارة المخاطر الاستباقية</p>
    </div>

    <!-- Login Form -->
    <form class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5">البريد الإلكتروني</label>
        <input type="email" [(ngModel)]="email" name="email" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-emerald-500 transition" placeholder="name@agency.ai">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5">كلمة المرور</label>
        <input type="password" [(ngModel)]="password" name="password" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-emerald-500 transition" placeholder="••••••••">
      </div>

      <button type="button" (click)]="submitLogin()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg py-2.5 text-sm font-bold shadow-lg shadow-emerald-900/30 transition-all mt-2">
        تسجيل الدخول للمنصة
      </button>
    </form>

    <!-- Hackathon Quick-Launch Action -->
    <div class="border-t border-slate-800/80 pt-5 text-center">
      <button type="button" (click)="launchDemoAccount()" class="inline-flex items-center space-x-reverse space-x-2 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 text-amber-400 px-5 py-2.5 rounded-xl text-xs font-bold tracking-wide transition-all animate-pulse">
        <span>🚀</span>
        <span>تشغيل الحساب التجريبي للجنة التحكيم (Launch Demo Account)</span>
      </button>
    </div>

  </div>
</div>
