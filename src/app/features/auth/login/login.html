<div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-right select-none" dir="rtl">
  <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6 relative overflow-hidden">
    
    <!-- تأثير توهج خلفي -->
    <div class="absolute -top-10 -left-10 w-32 h-32 bg-emerald-500/10 blur-2xl rounded-full pointer-events-none"></div>

    <!-- هيدر الشعار والعنوان -->
    <div class="text-center space-y-3 relative z-10">
      <!-- حقن الشعار وتكبيره قسرياً مع توهج ناعم لحل التباين البصري -->
      <div class="animate-bounce flex justify-center pb-2">
        <img src="logo.png?v=3" alt="Risklens Logo" class="h-28 w-auto object-contain drop-shadow-[0_0_20px_rgba(16,185,129,0.3)] filter brightness-110">
      </div>
      <h2 class="text-2xl font-black text-white tracking-wide">منصة RISKLENS الذكية</h2>
      <p class="text-xs text-slate-400">مستشارك المالي الذكي لإدارة اللاستثمار والمخاطر</p>
    </div>

    <!-- صندوق العرض السريع المضيء للحكام -->
    <div class="bg-amber-500/[0.04] border-2 border-amber-500/40 rounded-2xl p-5 text-center space-y-3 shadow-lg relative z-10">
      <div class="space-y-1">
        <span class="text-xs font-black text-amber-400 tracking-widest uppercase block">مسار عرض الحساب التجريبي </span>
        <h3 class="text-sm font-bold text-white">اضغط للولوج الفوري إلى حساب المستثمر (عائشة أحمد)</h3>
      </div>
      
      <!-- الزر المحدث والمربوط بدقة بالدالة الحالية -->
      <button type="button" (click)="bypassCacheLogin()" class="w-full bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-black text-sm py-4 rounded-xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center space-x-reverse space-x-2 cursor-pointer relative z-30">
        <span></span>
        <span>تشغيل الحساب التجريبي (Launch Demo Account)</span>
      </button>
    </div>

    <!-- حقول ديكورية ثابتة لمنع التشتيت -->
    <div class="relative flex py-1 items-center">
      <div class="flex-grow border-t border-slate-800"></div>
      <span class="flex-shrink mx-4 text-[10px] text-slate-500 font-bold uppercase">أو تسجيل الدخول التقليدي (مغلق)</span>
      <div class="flex-grow border-t border-slate-800"></div>
    </div>

    <div class="space-y-4 opacity-25 pointer-events-none relative z-10">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">البريد الإلكتروني</label>
        <div class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-500">aisha@investment.ai</div>
      </div>
    </div>

  </div>
</div>
